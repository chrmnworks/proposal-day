<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Our Journey" />
    <link rel="manifest" href="/site.webmanifest" />
    <title>Our Journey</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400&display=swap');

        :root {
            --bg-color: #fcf9f8;
            --text-dark: #2c2c2c;
            --accent: #b8860b; 
            --locked: #d1d1d1;
            --unlocked: #9CAF88; 
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Lato', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }

        .container { max-width: 400px; width: 100%; }

        /* Banner Styling */
        .banner-wrapper {
            width: 100%;
            height: 220px;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            background-color: #eee; /* Placeholder color */
        }

        .banner-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Main Button States */
        #main-action-btn {
            background-color: var(--locked);
            color: white;
            border: none;
            padding: 20px 30px;
            font-size: 1.2rem;
            font-family: 'Playfair Display', serif;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.5s ease;
            width: 100%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        #main-action-btn.unlocked {
            background-color: var(--unlocked);
            box-shadow: 0 0 20px rgba(156, 175, 136, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        /* Card Styling */
        #card-container {
            display: none;
            opacity: 0;
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            transform: translateY(20px);
            transition: all 0.5s ease;
            border-top: 6px solid var(--accent);
        }

        #card-container.visible { display: block; opacity: 1; transform: translateY(0); }

        .status-text { margin-top: 25px; font-size: 0.85rem; color: #888; }
        .hidden { display: none; }

    </style>
</head>
<body>

    <div class="container">
        <!-- Banner Image -->
        <div class="banner-wrapper">
            <!-- Replace the src below with your actual photo link -->
            <img src="IMG_5842.JPG" alt="Us">
        </div>

        <!-- Welcome Screen -->
        <div id="home-screen">
            <h1 style="font-family: 'Playfair Display'; margin-bottom: 15px;">Today is about us</h1>
            <p style="margin-bottom: 35px; line-height: 1.6; color: #666;">Something will appear when we arrive somewhere special!</p>
            
            <button id="main-action-btn" onclick="handleButtonClick()" disabled>
                Searching for Location...
            </button>
            
            <p id="gps-status" class="status-text">Waiting for GPS signal...</p>
        </div>

        <!-- The Content Card -->
        <div id="card-container">
            <span id="card-chapter" style="text-transform: uppercase; letter-spacing: 2px; color: #aaa; font-size: 0.8rem;"></span>
            <h2 id="card-title" style="margin: 15px 0 20px 0; color: var(--accent);"></h2>
            <p id="card-message" style="line-height: 1.7; margin-bottom: 30px;"></p>
            <button onclick="closeCard()" style="background: none; color: #999; border: 1px solid #ddd; padding: 10px 20px; border-radius: 20px;">Return to Map</button>
        </div>
    </div>

    <script>
        let unlockedStep = null;

        const itinerary = [
            { step: 1, lat: 32.7243, lon: -117.1249, radius: 2000, title: "Coffee in Grindelwald", message: "Let's start our day with something warm. I'm so happy to be here with you." },
            { step: 2, lat: 46.5594, lon: 7.8928, radius: 2000, title: "Mürren Peaks", message: "Look at the mountains around us. They've stood here for ages, just like my love for you." },
            { step: 3, lat: 46.5595, lon: 7.8850, radius: 1000, title: "A View for Two", message: "Lunch at Allmendhubel. Enjoy the view, but remember you're the best view I've ever seen." },
            { step: 4, lat: 46.5935, lon: 7.9076, radius: 1500, title: "Waterfall Whispers", message: "The Lauterbrunnen valley is magical, but it pales in comparison to you." },
            { step: 5, lat: 46.5990, lon: 7.9080, radius: 500,  title: "The Moment", message: "I brought you here to ask you a question. Turn around..." }
        ];

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        function handleButtonClick() {
            if (unlockedStep) {
                showCard(unlockedStep);
            }
        }

        function showCard(stepData) {
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('card-chapter').innerText = "Chapter " + stepData.step;
            document.getElementById('card-title').innerText = stepData.title;
            document.getElementById('card-message').innerText = stepData.message;
            document.getElementById('card-container').classList.add('visible');
        }

        function closeCard() {
            document.getElementById('card-container').classList.remove('visible');
            document.getElementById('home-screen').classList.remove('hidden');
        }

        function initGPS() {
            const btn = document.getElementById('main-action-btn');
            const status = document.getElementById('gps-status');

            navigator.geolocation.watchPosition((position) => {
                const { latitude, longitude } = position.coords;
                let found = null;

                for (let item of itinerary) {
                    if (getDistance(latitude, longitude, item.lat, item.lon) <= item.radius) {
                        found = item;
                        break;
                    }
                }

                if (found) {
                    unlockedStep = found;
                    btn.innerText = "Surprise Unlocked! Tap to Open";
                    btn.classList.add('unlocked');
                    btn.disabled = false;
                    status.innerText = "Location Verified ✔";
                } else {
                    unlockedStep = null;
                    btn.innerText = "Exploring...";
                    btn.classList.remove('unlocked');
                    btn.disabled = true;
                    status.innerText = "Keep walking to reach the next spot!";
                }
            }, (err) => {
                status.innerText = "GPS Error: Please ensure Location is enabled.";
            }, { enableHighAccuracy: true });
        }

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const forcedStep = urlParams.get('step');
            if (forcedStep) {
                const data = itinerary.find(i => i.step == forcedStep);
                if (data) showCard(data);
            } else {
                initGPS();
            }
        };
    </script>
</body>
</html>
